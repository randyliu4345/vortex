adapter driver remote_bitbang
remote_bitbang_port 9823
remote_bitbang_host localhost

# Target setup
transport select jtag
adapter speed 100

set _CHIPNAME vortex
jtag newtap $_CHIPNAME cpu -irlen 5

# --- BEGIN Multi-Thread Configuration ---

# Create one target per thread (NUM_THREADS=4)
for {set i 0} {$i < 4} {incr i} {
    target create $_CHIPNAME.riscv$i riscv -chain-position $_CHIPNAME.cpu -coreid $i
    $_CHIPNAME.riscv$i riscv set_reset_timeout_sec 2
    $_CHIPNAME.riscv$i riscv set_command_timeout_sec 2
}

# Set default target to thread 0
targets $_CHIPNAME.riscv0

# --- END Multi-Thread Configuration ---

init
halt